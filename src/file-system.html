<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>File Viewer</title>
		<link rel="stylesheet" href="css/style.css" />
		<script src="js/script.js" defer></script>
	</head>
	<body>
		<div id="layout-header"></div>

		<main class="container">
			<section class="file-viewer-page card">
				<h1 class="page-title">File System Explorer</h1>
				<p class="info-text">
					Click the ⏬ icon to download specific logs or configuration files.
				</p>

				<article id="file-system" class="sensor-group">
					<p class="info-text">Scanning storage...</p>
				</article>
			</section>
		</main>

		<div id="layout-footer"></div>
	</body>
</html>
