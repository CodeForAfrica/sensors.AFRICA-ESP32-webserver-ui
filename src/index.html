<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Home</title>
		<link rel="stylesheet" href="css/style.css" />
		<script src="js/script.js" defer></script>
	</head>
	<body>
		<div id="layout-header"></div>

		<main class="container">
			<section class="sensor-overview-page">
				<h1 class="page-title">Sensor Data Overview</h1>

				<!-- Added Device ID display if you want it -->
				<p class="text-sm">Device ID: <span id="device-id">Loading...</span></p>

				<div class="sensor-overview__groups">
					<article class="sensor-group">
						<h2 class="sensor-group__title">Air Quality</h2>
						<div class="sensor-group__data">
							<div class="sensor-data__row">
								<span class="sensor-data__label">PM1</span>
								<span class="sensor-data__value" id="PM1_DATA">Unavailable</span>
							</div>
							<div class="sensor-data__row">
								<span class="sensor-data__label">PM2.5</span>
								<span class="sensor-data__value" id="PM25_DATA">Unavailable</span>
							</div>
							<div class="sensor-data__row">
								<span class="sensor-data__label">PM10</span>
								<span class="sensor-data__value" id="PM10_DATA">Unavailable</span>
							</div>
						</div>
					</article>

					<article class="sensor-group">
						<h2 class="sensor-group__title">Environment</h2>
						<div class="sensor-group__data">
							<div class="sensor-data__row">
								<span class="sensor-data__label">Temperature:</span>
								<span class="sensor-data__value" id="temperature">Unavailable</span>
							</div>
							<div class="sensor-data__row">
								<span class="sensor-data__label">Humidity:</span>
								<span class="sensor-data__value" id="humidity">Unavailable</span>
							</div>
						</div>
					</article>
				</div>
			</section>
		</main>

		<div id="layout-footer"></div>
	</body>
</html>
