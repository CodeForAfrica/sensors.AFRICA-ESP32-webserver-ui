<!doctype html><html lang=en><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Device Config</title><link rel=stylesheet href=style.min.css><script type=module src=script.min.js></script><div id=layout-header></div><main class=container><section class=config-page id=config_page aria-labelledby=page-title><h1 id=page-title class=page-title>Device Configuration</h1><div class=stepper role=tablist aria-label="Configuration steps"><button type=button class="stepper__indicator stepper__indicator--active" data-step=0 role=tab aria-selected=true aria-controls=step-0 id=step-ind-0>1</button> <button type=button class=stepper__indicator data-step=1 role=tab aria-selected=false aria-controls=step-1 id=step-ind-1>2</button> <button type=button class=stepper__indicator data-step=2 role=tab aria-selected=false aria-controls=step-2 id=step-ind-2>3</button></div><form id=wifiForm class="config-form step step--active" data-step=0 aria-hidden=false><fieldset><legend class=sensor-group__title>WiFi Settings</legend><div class=form-group><label for=hotspots-list>Available hotspots</label><ul class=hotspots-list id=hotspots-list aria-live=polite><li class=info-text>Scanning...</ul></div><div class=form-group><label for=ssid>WiFi SSID</label> <input id=ssid name=ssid autocomplete=off></div><div class=form-group><label for=wifiPwd>WiFi Password</label><div class=password-wrapper><input type=password id=wifiPwd name=wifiPwd> <label class=show-password-label for=toggle-wifiPwd><input type=checkbox id=toggle-wifiPwd aria-label="Show WiFi password" title="Show password" class=toggle-password></label></div></div><div class=step-btns><button type=button class="btn btn--primary next-btn" data-next=1>Next</button></div></fieldset></form><form id=gsmForm class="config-form step hidden" data-step=1 aria-hidden=true><fieldset><legend class=sensor-group__title>GSM & SIM Config</legend><div class=form-group><label for=apn>APN Username</label> <input id=apn name=apn></div><div class=form-group><label for=simPin>SIM PIN</label> <input id=simPin name=simPin placeholder="4 digits" inputmode=numeric maxlength=4 pattern=[0-9]{4}></div><div class=step-btns><button type=button class="btn prev-btn" data-prev=0>Previous</button> <button type=button class="btn btn--primary next-btn" data-next=2>Next</button></div></fieldset></form><form id=powerForm class="config-form step hidden" data-step=2 aria-hidden=true><fieldset><legend class=sensor-group__title>Power Options</legend><div class=form-group><label class=flex-row for=powerSaver><span>Enable Power Saver</span> <input type=checkbox id=powerSaver name=powerSaver></label></div><div class=step-btns><button type=button class="btn prev-btn" data-prev=1>Previous</button> <button class="btn btn--primary">Save Config</button></div></fieldset></form><button type=button class="btn btn--secondary skip-btn" id=skip-btn>Skip device config</button></section></main><div id=layout-footer></div>
